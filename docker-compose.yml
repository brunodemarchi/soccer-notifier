services:
  soccer-notifier:
    image: ghcr.io/brunodemarchi/soccer-notifier:latest
    restart: always
    env_file: .env
    volumes:
      - ./data:/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount Docker credentials so Watchtower can pull from ghcr.io
      # Run `docker login ghcr.io` on the VPS first, then this file exists automatically
      - /root/.docker/config.json:/config.json
    environment:
      - DOCKER_CONFIG=/config.json
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_POLL_INTERVAL=300   # check every 5 minutes
      - WATCHTOWER_LABEL_ENABLE=true   # only update containers with the label above
      - WATCHTOWER_CLEANUP=true        # remove old images after update
